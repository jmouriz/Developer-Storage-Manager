name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Cleanup and safety considerations
      description: If this affects deletion, explain how confirmation and recovery should work.
