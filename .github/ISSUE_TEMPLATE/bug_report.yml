name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Xcode Storage Manager. Remove device identifiers and other sensitive data from screenshots or logs.
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.x
    validations:
      required: true
  - type: input
    id: xcode
    attributes:
      label: Xcode version
      placeholder: Xcode 16.x
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Select…
        3. Click…
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add sanitized logs or screenshots if useful.
